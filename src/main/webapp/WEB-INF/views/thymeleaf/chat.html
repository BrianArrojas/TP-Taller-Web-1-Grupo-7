<!DOCTYPE html>

<head>

</head>
<body class="container mt-4">

    <h1>Chat de la mascota #<span th:text="${idReporte}"></span></h1>

    <div id="ventanaChat" class="border rounded p-3 mb-3" style="height: 300px; overflow-y: scroll;">

    <script th:src="@{/js/chat.js}"></script>

</body>
</html>
