<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Conversaciones del reporte</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <style>
        .conversation-item {
            transition: background-color 0.2s ease;
        }
        .conversation-item:hover {
            background-color: #f8f9fa;
        }
        .avatar-circle {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background-color: #0d6efd;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 1.2rem;
            text-transform: uppercase;
        }
    </style>
</head>
<body class="container mt-4">
    <h2 class="mb-4 fw-bold">Conversaciones del reporte #<span th:text="${idReporte}"></span></h2>

    <div th:if="${conversaciones.isEmpty()}" class="text-center py-5 text-muted">
        <i class="bi bi-chat-dots display-4 mb-3 d-block"></i>
        <p>No hay conversaciones iniciadas para este reporte.</p>
    </div>

    <div th:each="conv : ${conversaciones}" class="card mb-3 shadow-sm border-0 conversation-item">
        <div class="card-body d-flex align-items-center gap-3">
            <div class="avatar-circle" th:text="${#strings.isEmpty(conv.nombreInteresado) ? '?' : #strings.substring(conv.nombreInteresado,0,1)}">?</div>
            <div class="flex-grow-1">
                <h6 class="fw-bold mb-1" th:text="${conv.nombreInteresado}">Nombre</h6>
                <p class="text-muted mb-0 small" th:text="${conv.ultimoMensaje}">Último mensaje</p>
                <small class="text-muted" th:text="${conv.fechaUltimoMensaje}">Fecha</small>
            </div>
            <a th:href="@{/chat-privado(codigoChat=${conv.codigoChat}, idReporte=${idReporte})}"
               class="btn btn-outline-primary btn-sm rounded-pill px-3">
                <i class="bi bi-chat-fill me-1"></i>Ir al chat
            </a>
        </div>
    </div>

    <a th:href="@{/mis-reportes}" class="btn btn-secondary mt-3 rounded-pill">
        <i class="bi bi-arrow-left me-2"></i>Volver a mis reportes
    </a>
</body>
</html>
