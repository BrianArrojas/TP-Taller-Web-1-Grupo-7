<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Conversaciones del reporte</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-4">
    <h2>Conversaciones del reporte #<span th:text="${idReporte}"></span></h2>
    <div th:if="${conversaciones.isEmpty()}">
        <p>No hay conversaciones iniciadas para este reporte.</p>
    </div>
    <div th:each="conv : ${conversaciones}" class="card mb-3">
        <div class="card-body">
            <h5 class="card-title" th:text="${conv.nombreInteresado}"></h5>
            <p class="card-text"><strong>Último mensaje:</strong> <span th:text="${conv.ultimoMensaje}"></span></p>
            <a th:href="@{/chat-privado(codigoChat=${conv.codigoChat}, idReporte=${idReporte})}" 
            class="btn btn-primary btn-sm float-end">Ir al chat</a>
        </div>
    </div>
    <a th:href="@{/mis-reportes}" class="btn btn-secondary mt-3">Volver a mis reportes</a>
</body>
</html>
