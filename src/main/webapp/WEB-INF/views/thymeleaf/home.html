<!DOCTYPE HTML>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

    <title>Mascotas perdidas y encontradas</title>

    <!-- Boostrap core css -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65" crossorigin="anonymous">

    <!-- custom style -->
    <link rel="stylesheet" th:href="@{/css/main.css}" />

</head>

<body>

    <nav class="navbar navbar-expand-md navbar-dark bg-dark fixed-top">
        <div class="container">
            <a class="navbar-brand" href="#">Mascotas</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarCollapse"
                aria-controls="navbarCollapse" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarCollapse">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/home}">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/realizar-reporte}">Reportar Mascota</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/mi-perfil}">Perfil</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/mis-reportes}">Mis Reportes</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/mapa-reportes}">Mapa de Reportes</a>
                    </li>
                    <li class="nav-item" th:if="${session.ROL == 'ADMIN'}">
                        <a class="nav-link text-warning fw-bold" th:href="@{/admin}">Panel Admin</a>
                    </li>
                </ul>
                <form class="d-flex mt-2 mt-md-0 ms-auto">
                    <a class="btn btn-outline-success my-2 my-sm-0" th:href="@{/logout}">Logout</a>
                </form>
            </div>
        </div>
    </nav>

    <main role="main" class="container pt-5 mt-2 pb-5">
        <div class="container">
            <h1 class="mb-4 text-center">Mascotas perdidas y encontradas</h1>

            <!-- Formulario de Búsqueda y Filtros -->
        <div class="card mb-4 shadow-sm border-0">
            <div class="card-body p-4" style="background-color: #f8f9fa; border-radius: 8px;">
                <form th:action="@{/home}" method="get">
                    <div class="row g-3">
                        <!-- Barra de Búsqueda Principal -->
                        <div class="col-md-12">
                            <div class="input-group">
                                <input class="form-control" type="search" name="busqueda" th:value="${busqueda}"
                                    placeholder="Buscar por tipo o nombre de mascota..." aria-label="Buscar">
                                <button class="btn btn-primary px-4" type="submit">Buscar</button>
                            </div>
                        </div>
                        
                        <!-- Filtros Adicionales -->
                        <div class="col-md-3">
                            <label class="form-label small fw-bold text-muted">Tipo de Reporte</label>
                            <select class="form-select form-select-sm" name="tipoDeReporte">
                                <option value="Todos" th:selected="${tipoDeReporte == 'Todos' || tipoDeReporte == null}">Todos</option>
                                <option value="perdido" th:selected="${tipoDeReporte == 'perdido'}">Perdido</option>
                                <option value="encontrado" th:selected="${tipoDeReporte == 'encontrado'}">Encontrado</option>
                            </select>
                        </div>
                        
                        <div class="col-md-3">
                            <label class="form-label small fw-bold text-muted">Especie</label>
                            <select class="form-select form-select-sm" name="especie">
                                <option value="Todas" th:selected="${especie == 'Todas' || especie == null}">Todas</option>
                                <option value="gato" th:selected="${especie == 'gato'}">Gato</option>
                                <option value="perro" th:selected="${especie == 'perro'}">Perro</option>
                                <option value="otro" th:selected="${especie == 'otro'}">Otro</option>
                            </select>
                        </div>
                        
                        <div class="col-md-3">
                            <label class="form-label small fw-bold text-muted">Fecha Desde</label>
                            <input type="date" class="form-control form-control-sm" name="fechaDesde" th:value="${fechaDesde}" />
                        </div>
                        
                        <div class="col-md-3">
                            <label class="form-label small fw-bold text-muted">Fecha Hasta</label>
                            <input type="date" class="form-control form-control-sm" name="fechaHasta" th:value="${fechaHasta}" />
                        </div>
                        
                        <!-- Limpiar Filtros -->
                        <div class="col-12 text-end">
                            <a th:href="@{/home}" class="btn btn-sm btn-outline-secondary">Limpiar Filtros</a>
                        </div>
                    </div>
                </form>
            </div>
        </div>

            <div class="row row-cols-1 row-cols-md-4 g-4">
                <div class="col" th:each="mascota : ${mascotas}">
                    <a class="" th:href="@{/detalle/{id}(id=${mascota.id})}" style="text-decoration: none;">
                        <div class="card h-100 card-hover">
                            <!-- Si no hay imagen disponible, mostramos un placeholder -->
                            <img th:src="@{${mascota.primeraRutaImagen}}" class="card-img-top"
                                alt="Imagen de la mascota" style="height: 200px; object-fit: cover;">
                            <div class="card-body">
                                <h5 class="card-title fw-bold" th:text="${mascota.nombre ?: 'Sin nombre'}">Nombre de la Mascota
                                </h5>
                                <p class="card-text">
                                    <span class="text-success text-capitalize fw-bold" th:text="${mascota.especie}"></span>
                                </p>
                            </div>
                            <div class="card-footer d-flex justify-content-between align-items-center">
                                <small class="text-muted">
                                    <strong>Fecha:</strong> <span th:text="${mascota.fechaFormateada}"></span>
                                </small>
                                <span
                                    th:class="${mascota.tipoDeReporte == 'Perdido' ? 'badge bg-danger fw-bold' : 'badge bg-primary fw-bold'}"
                                    th:text="${mascota.tipoDeReporte}"></span>
                            </div>
                        </div>
                    </a>
                </div>
            </div>

            <!-- Paginado -->
            <nav aria-label="Navegación de páginas" class="mt-5" th:if="${totalPages > 1}">
                <ul class="pagination justify-content-center">
                    <!-- Anterior -->
                    <li class="page-item" th:classappend="${currentPage == 1} ? 'disabled'">
                        <a class="page-link" th:href="@{/home(page=${currentPage - 1}, busqueda=${busqueda}, tipoDeReporte=${tipoDeReporte}, especie=${especie}, fechaDesde=${fechaDesde}, fechaHasta=${fechaHasta})}" tabindex="-1" aria-disabled="true">Anterior</a>
                    </li>
                    
                    <!-- Números de Página -->
                    <li class="page-item" th:classappend="${pageNum == currentPage} ? 'active'" th:each="pageNum : ${#numbers.sequence(1, totalPages)}">
                        <a class="page-link" th:href="@{/home(page=${pageNum}, busqueda=${busqueda}, tipoDeReporte=${tipoDeReporte}, especie=${especie}, fechaDesde=${fechaDesde}, fechaHasta=${fechaHasta})}" th:text="${pageNum}">1</a>
                    </li>
                    
                    <!-- Siguiente -->
                    <li class="page-item" th:classappend="${currentPage == totalPages} ? 'disabled'">
                        <a class="page-link" th:href="@{/home(page=${currentPage + 1}, busqueda=${busqueda}, tipoDeReporte=${tipoDeReporte}, especie=${especie}, fechaDesde=${fechaDesde}, fechaHasta=${fechaHasta})}">Siguiente</a>
                    </li>
                </ul>
            </nav>
        </div>
    </main>

    <!-- Boostrap core js -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-kenU1KFdBIe4zVF0s0G1M5b4hcpxyD9F7jL+jjXkk+Q2h455rYXK/7HAuoJl+0I4"
        crossorigin="anonymous"></script>

    <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>

    <script th:inline="javascript">
        window.userId = /*[[${session.usuario?.id}]]*/ null;
    </script>

    <script th:src="@{/js/notificaciones.js}"></script>
    
</body>

</html>
