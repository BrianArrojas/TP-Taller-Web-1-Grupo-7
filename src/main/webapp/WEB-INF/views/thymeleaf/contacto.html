<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Contactar al dueño</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-4">
<nav class="navbar navbar-expand-md navbar-dark bg-dark fixed-top">
    <a class="navbar-brand" href="#">Mascotas</a>
    <div class="collapse navbar-collapse" id="navbarCollapse">
        <ul class="navbar-nav mr-auto">
            <li class="nav-item active">
                <a class="nav-link" th:href="@{/home}">Home</a>
            </li>
            <li class="nav-item">
                <a class="nav-link" th:href="@{/realizar-reporte}">Reportar Mascota</a>
            </li>
            <li class="nav-item">
                <a class="nav-link" th:href="@{/mi-perfil}">Perfil</a>
            </li>
            <li class="nav-item">
                <a class="nav-link" th:href="@{/mis-reportes}">Mis Reportes</a>
            </li>
            <li class="nav-item">
                <a class="nav-link" th:href="@{/mapa-reportes}">Mapa de Reportes</a>
            </li>
            <li class="nav-item" th:if="${session.ROL == 'ADMIN'}">
                <a class="nav-link text-warning fw-bold" th:href="@{/admin}">Panel Admin</a>
            </li>
        </ul>
        <form class="form-inline mt-2 mt-md-0 ml-auto" style="margin-left: auto;">
            <a class="btn btn-outline-success my-2 my-sm-0" th:href="@{/logout}">Logout</a>
        </form>
    </div>
</nav>
    <h1>Contactar al dueño</h1>
    <p>Completá el siguiente formulario. Tu mensaje será enviado sin revelar los datos de contacto del dueño.</p>

    <form th:action="@{/contacto/{id}(id=${id})}" method="post">
        <div class="mb-3">
            <label for="nombre" class="form-label">Tu nombre</label>
            <input type="text" class="form-control" id="nombre" name="nombre" required>
        </div>
        <div class="mb-3">
            <label for="email" class="form-label">Tu email</label>
            <input type="email" class="form-control" id="email" name="email" required>
        </div>
        <div class="mb-3">
            <label for="mensaje" class="form-label">Mensaje</label>
            <textarea class="form-control" id="mensaje" name="mensaje" rows="4" required></textarea>
        </div>
        <button type="submit" class="btn btn-primary">Enviar mensaje</button>
        <a th:href="@{/detalle/{id}(id=${id})}" class="btn btn-secondary">Cancelar</a>
    </form>
</body>
</html>
