<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Chat privado</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <style>
        .msg-bubble {
            max-width: 70%;
            padding: 10px 16px;
            border-radius: 20px;
            margin-bottom: 8px;
            clear: both;
            word-wrap: break-word;
        }
        .msg-sent {
            background-color: #0084ff;
            color: #fff;
            float: right;
            border-bottom-right-radius: 4px;
        }
        .msg-received {
            background-color: #e4e6eb;
            color: #000;
            float: left;
            border-bottom-left-radius: 4px;
        }
        .msg-header {
            display: flex;
            justify-content: space-between;
            font-size: 0.75rem;
            margin-bottom: 2px;
        }
        .msg-content {
            font-size: 0.95rem;
        }
        .clearfix::after {
            content: "";
            clear: both;
            display: table;
        }

        /* Encabezado del chat */
        .chat-header {
            background-color: #ffffff;
            border-bottom: 1px solid #e0e0e0;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .chat-header-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background-color: #0d6efd;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 1.2rem;
        }
        .chat-header-name {
            font-weight: 600;
            font-size: 1.1rem;
        }
        .chat-header-subtitle {
            font-size: 0.8rem;
            color: #6c757d;
        }

        /* Fondo del área de mensajes */
        .chat-messages {
            background-color: #f5f5f5;
            border-radius: 12px;
            padding: 16px;
            min-height: 300px;
            max-height: 500px;
            overflow-y: auto;
        }
    </style>
</head>
<body class="container mt-4">

    <!-- Encabezado mejorado con botón Volver -->
    <div class="chat-header mb-3 rounded shadow-sm">
        <div class="chat-header-avatar" th:text="${#strings.isEmpty(nombreMascota) ? '?' : #strings.substring(nombreMascota,0,1)}">?</div>
        <div class="flex-grow-1">
            <div class="chat-header-name" th:text="${nombreMascota} ?: 'Mascota'">Mascota</div>
            <div class="chat-header-subtitle">
                <i class="bi bi-lock-fill me-1"></i>Chat privado
            </div>
        </div>
        <a th:href="@{/home}" class="btn btn-outline-secondary btn-sm rounded-pill ms-auto" title="Volver al inicio">
            <i class="bi bi-arrow-left me-1"></i>Volver
        </a>
    </div>

    <div class="chat-messages" id="ventanaChat">
        <div id="mensajes" class="clearfix"></div>
    </div>

    <div class="input-group mt-3">
        <input type="text" id="campoMensaje" class="form-control rounded-pill" placeholder="Escribe tu mensaje...">
        <button id="botonEnviar" class="btn btn-primary rounded-pill ms-2 px-4">
            <i class="bi bi-send-fill"></i>
        </button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>

    <script th:inline="javascript">
        window.codigoChat = /*[[${codigoChat}]]*/ '';
        window.idReporte = /*[[${idReporte}]]*/ null;
        window.remitente = /*[[${remitente}]]*/ 'Visitante';
    </script>

    <script th:src="@{/js/chat-privado.js}"></script>

</body>
</html>
