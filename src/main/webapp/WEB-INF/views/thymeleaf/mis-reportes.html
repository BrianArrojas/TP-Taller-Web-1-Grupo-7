<!DOCTYPE HTML>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>Mis Reportes</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link rel="stylesheet" th:href="@{/css/main.css(v=3.5)}" />
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap');
        html {
            overflow-y: scroll !important;
        }
        body {
            font-family: 'Outfit', sans-serif !important;
            background-color: #f4f6f9 !important;
            color: #2d3748 !important;
        }
    </style>
    <style>
        .reporte-item {
            border: 1px solid #dee2e6;
            padding: 15px;
            margin-bottom: 15px;
            background-color: white;
            transition: background-color 0.3s ease;
        }
        .reporte-item:hover { background-color: #f8f9fa; }
        .img-listado { width: 120px; height: 120px; object-fit: cover; border-radius: 4px; }
    </style>
</head>

<body>

<nav class="navbar navbar-expand-md navbar-dark bg-dark fixed-top">
    <div class="container">
        <a class="navbar-brand fw-bold text-primary-gradient" th:href="@{/home}"><i class="bi bi-radar me-1"></i>Rastropet</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarCollapse" aria-controls="navbarCollapse" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarCollapse">
            <ul class="navbar-nav me-auto">
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/realizar-reporte}">Reportar</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/mapa-reportes}">Mapa</a>
                </li>
                <li class="nav-item" th:if="${session.ROL == 'ADMIN'}">
                    <a class="nav-link text-warning fw-bold" th:href="@{/admin}">Panel Admin</a>
                </li>
            </ul>
            <div class="d-flex align-items-center ms-auto navbar-user-section">
                <div class="dropdown">
                    <a class="nav-profile-avatar" href="#" role="button" id="userDropdown" data-bs-toggle="dropdown" aria-expanded="false"
                       style="width: 38px; height: 38px; border-radius: 50%; background-color: #228be6; color: #ffffff !important; display: inline-flex; align-items: center; justify-content: center; font-weight: 600; font-size: 1.2rem; text-decoration: none !important; text-transform: uppercase;"
                       th:title="${session.usuario != null} ? 'Opciones de ' + ${session.usuario.nombre} : 'Usuario'"
                       th:text="${session.usuario != null and not #strings.isEmpty(session.usuario.nombre) ? #strings.substring(session.usuario.nombre, 0, 1) : 'U'}">U</a>
                    <ul class="dropdown-menu dropdown-menu-end shadow border-0 mt-2" aria-labelledby="userDropdown" style="border-radius: 12px; min-width: 160px;">
                        <li>
                            <a class="dropdown-item py-2 px-3 d-flex align-items-center gap-2" th:href="@{/mi-perfil}">
                                <i class="bi bi-person-fill text-primary"></i>
                                <span>Mi Perfil</span>
                            </a>
                        </li>
                        <li>
                            <a class="dropdown-item py-2 px-3 d-flex align-items-center gap-2" th:href="@{/mis-reportes}">
                                <i class="bi bi-file-earmark-text-fill text-success"></i>
                                <span>Mis Reportes</span>
                            </a>
                        </li>
                        <li><hr class="dropdown-divider my-1"></li>
                        <li>
                            <a class="dropdown-item py-2 px-3 d-flex align-items-center gap-2 text-danger" th:href="@{/logout}">
                                <i class="bi bi-box-arrow-right"></i>
                                <span>Cerrar Sesión</span>
                            </a>
                        </li>
                    </ul>
                </div>
            </div>
        </div>
    </div>
</nav>

<main class="container mt-5 pt-5">
    <h1 class="mb-4 text-center">Mis Reportes</h1>

    <div th:each="reporte : ${reportes}" class="reporte-item shadow-sm">
        <div class="row align-items-center">
            <div class="col-md-2">
                <a th:href="@{'/detalle/' + ${reporte.id}}" style="text-decoration: none;">
                    <div class="d-grid gap-1" style="grid-template-columns: repeat(2, 60px);">

                        <th:block th:if="${reporte.fotos != null && !reporte.fotos.isEmpty()}">
                            <div th:each="foto, iterStat : ${reporte.fotos}"
                                 th:if="${iterStat.index < 4}"
                                 class="overflow-hidden" style="width: 60px; height: 60px;">

                                <img th:src="@{${foto.img.startsWith('img/') ? '/' + foto.img : '/img/' + foto.img}}"
                                     class="img-fluid w-100 h-100"
                                     style="object-fit: cover;"
                                     alt="Foto">
                            </div>
                        </th:block>

                        <div th:if="${reporte.fotos == null || reporte.fotos.isEmpty()}"
                             class="overflow-hidden" style="width: 60px; height: 60px;">
                            <img src="/img/default-pet.png" class="img-fluid w-100 h-100" style="object-fit: cover;" alt="Sin foto">
                        </div>

                    </div>
                </a>
            </div>

            <div class="col-md-7">
                <a th:href="@{'/detalle/' + ${reporte.id}}" style="text-decoration: none; color: inherit;">
                    <h5 th:text="${reporte.nombre}">Nombre</h5>
                </a>
                <p class="mb-1"><strong>Tipo:</strong> <span th:text="${reporte.tipoDeReporte}"></span></p>
                <span th:class="${reporte.registroActivo ? 'badge bg-primary' : 'badge bg-secondary'}"
                      th:text="${reporte.registroActivo ? 'Activo' : 'Inactivo'}"></span>
            </div>

            <div class="col-md-3 d-flex flex-column align-items-end">
                <div th:if="${reporte.registroActivo}" class="d-flex flex-column gap-2 w-100">
                    <a th:href="@{/reporte/{id}/conversaciones(id=${reporte.id})}" class="btn btn-outline-primary btn-sm w-100 mb-1">Conversaciones</a>
                    <button type="button" class="btn btn-outline-warning btn-sm w-100"
                            data-bs-toggle="modal" th:data-bs-target="'#modalEditar' + ${reporte.id}">
                        Editar
                    </button>
                    <form th:action="@{/cancelar-reporte}" method="POST" class="w-100">
                        <input type="hidden" name="id" th:value="${reporte.id}">
                        <button type="submit" class="btn btn-outline-danger btn-sm w-100">Cancelar</button>
                    </form>
                </div>
                <span th:unless="${reporte.registroActivo}" class="text-muted">Finalizado</span>
            </div>

            <div class="modal fade" th:id="'modalEditar' + ${reporte.id}" tabindex="-1" aria-hidden="true">
                <div class="modal-dialog modal-lg">
                    <div class="modal-content">
                        <form th:action="@{/modificar-reporte}" method="POST">
                            <input type="hidden" name="id" th:value="${reporte.id}" />
                            <div class="modal-header">
                                <h5 class="modal-title">Editar: <span th:text="${reporte.nombre}"></span></h5>
                                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                            </div>
                            <div class="modal-body" style="padding: 20px;">
                                <div class="row mb-3 align-items-center">
                                    <div class="col-md-4"><label class="fw-bold">Nombre:</label></div>
                                    <div class="col-md-8"><input type="text" name="nombre" th:value="${reporte.nombre}" class="form-control" required /></div>
                                </div>
                                <div class="row mb-3 align-items-center">
                                    <div class="col-md-4"><label class="fw-bold">Descripción:</label></div>
                                    <div class="col-md-8"><input type="text" name="descripcion" th:value="${reporte.descripcion}" class="form-control" /></div>
                                </div>
                                <div class="row mb-3 align-items-center">
                                    <div class="col-md-4"><label class="fw-bold">Ubicación:</label></div>
                                    <div class="col-md-8"><input type="text" name="ubicacion" th:value="${reporte.ubicacion}" class="form-control" /></div>
                                </div>
                                <div class="row mb-3 align-items-center">
                                    <div class="col-md-4"><label class="fw-bold">Raza:</label></div>
                                    <div class="col-md-8"><input type="text" name="raza" th:value="${reporte.raza}" class="form-control" /></div>
                                </div>
                                <div class="row mb-3 align-items-center">
                                    <div class="col-md-4"><label class="fw-bold">Color:</label></div>
                                    <div class="col-md-8"><input type="text" name="color" th:value="${reporte.color}" class="form-control" /></div>
                                </div>
                                <div class="row mb-3 align-items-center">
                                    <div class="col-md-4"><label class="fw-bold">Tipo:</label></div>
                                    <div class="col-md-8">
                                        <select name="tipoDeReporte" class="form-select">
                                            <option value="perdido" th:selected="${reporte.tipoDeReporte == 'perdido'}">Perdido</option>
                                            <option value="encontrado" th:selected="${reporte.tipoDeReporte == 'encontrado'}">Encontrado</option>
                                        </select>
                                    </div>
                                </div>
                                <div class="row mb-3 align-items-center">
                                    <div class="col-md-4"><label class="fw-bold">Especie:</label></div>
                                    <div class="col-md-8">
                                        <select name="especie" class="form-select">
                                            <option value="perro" th:selected="${reporte.especie == 'perro'}">Perro</option>
                                            <option value="gato" th:selected="${reporte.especie == 'gato'}">Gato</option>
                                            <option value="otro" th:selected="${reporte.especie == 'otro'}">Otro</option>
                                        </select>
                                    </div>
                                </div>
                                <div class="row mb-3 align-items-center">
                                    <div class="col-md-4"><label class="fw-bold">Tamaño:</label></div>
                                    <div class="col-md-8">
                                        <select name="tamano" class="form-select">
                                            <option value="pequeno" th:selected="${reporte.tamano == 'pequeno'}">Pequeño</option>
                                            <option value="mediano" th:selected="${reporte.tamano == 'mediano'}">Mediano</option>
                                            <option value="grande" th:selected="${reporte.tamano == 'grande'}">Grande</option>
                                        </select>
                                    </div>
                                </div>
                            </div>
                            <div class="modal-footer">
                                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                                <button type="submit" class="btn btn-primary">Guardar Cambios</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>

        </div>
    </div>
    <p th:if="${reportes.isEmpty()}" class="text-center mt-5">No tenés reportes activos.</p>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
