<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Mensaje enviado</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-4">
<nav class="navbar navbar-expand-md navbar-dark bg-dark fixed-top">
    <a class="navbar-brand" href="#">Mascotas</a>
    <div class="collapse navbar-collapse" id="navbarCollapse">
        <ul class="navbar-nav mr-auto">
            <li class="nav-item active">
                <a class="nav-link" th:href="@{/home}">Home</a>
            </li>
            <li class="nav-item">
                <a class="nav-link" th:href="@{/realizar-reporte}">Reportar Mascota</a>
            </li>
            <li class="nav-item">
                <a class="nav-link" th:href="@{/mi-perfil}">Perfil</a>
            </li>
            <li class="nav-item">
                <a class="nav-link" th:href="@{/mis-reportes}">Mis Reportes</a>
            </li>
            <li class="nav-item">
                <a class="nav-link" th:href="@{/mapa-reportes}">Mapa de Reportes</a>
            </li>
            <li class="nav-item" th:if="${session.ROL == 'ADMIN'}">
                <a class="nav-link text-warning fw-bold" th:href="@{/admin}">Panel Admin</a>
            </li>
        </ul>
        <form class="form-inline mt-2 mt-md-0 ml-auto" style="margin-left: auto;">
            <a class="btn btn-outline-success my-2 my-sm-0" th:href="@{/logout}">Logout</a>
        </form>
    </div>
</nav>
    <div class="alert alert-success" role="alert">
        <h4 class="alert-heading">¡Mensaje enviado!</h4>
        <p>Gracias, <span th:text="${nombre}">Nombre</span>. Tu mensaje ha sido enviado al dueño de la mascota.</p>
        <hr>
        <p class="mb-0">En breve recibirás una respuesta en tu correo electrónico.</p>
    </div>
    <a th:href="@{/detalle/{id}(id=${id})}" class="btn btn-primary">Volver al detalle</a>
</body>
</html>
