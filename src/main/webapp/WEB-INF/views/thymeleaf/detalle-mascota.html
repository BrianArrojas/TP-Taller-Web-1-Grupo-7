<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Detalle de Mascota</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/main.css}" />
</head>
<body th:data-id-reporte="${mascota.id}">

<nav class="navbar navbar-expand-md navbar-dark bg-dark fixed-top">
    <div class="container">
        <a class="navbar-brand" href="#">Mascotas</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarCollapse"
                aria-controls="navbarCollapse" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarCollapse">
            <ul class="navbar-nav me-auto">
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/home}">Home</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/realizar-reporte}">Reportar Mascota</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/mi-perfil}">Perfil</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/mis-reportes}">Mis Reportes</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/mapa-reportes}">Mapa de Reportes</a>
                </li>
                <li class="nav-item" th:if="${session.ROL == 'ADMIN'}">
                    <a class="nav-link text-warning fw-bold" th:href="@{/admin}">Panel Admin</a>
                </li>
            </ul>
            <form class="d-flex mt-2 mt-md-0 ms-auto">
                <a class="btn btn-outline-success my-2 my-sm-0" th:href="@{/logout}">Logout</a>
            </form>
        </div>
    </div>
</nav>

<main class="container mt-5 pt-5">
    <h1>Detalle de la mascota</h1>
    <div class="card mb-3">
        <div class="row g-0">
            <div class="col-md-4">
                <img th:src="@{${mascota.fotoUrl}}" class="img-fluid rounded-start" alt="Foto de la mascota"
                     th:attr="onerror='this.onerror=null;this.src=\'' + @{/img/default-pet.png} + '\';'">
            </div>
            <div class="col-md-8">
                <div class="card-body">
                    <h5 class="card-title" th:text="${mascota.nombre}">Nombre</h5>
                    <p class="card-text">
                        <strong>Tipo:</strong> <span th:text="${mascota.tipoDeReporte}"></span><br>
                        <strong>Especie:</strong> <span th:text="${mascota.especie}"></span><br>
                        <strong>Raza:</strong> <span th:text="${mascota.raza}"></span><br>
                        <strong>Color:</strong> <span th:text="${mascota.color}"></span><br>
                        <strong>Tamaño:</strong> <span th:text="${mascota.tamano}"></span><br>
                        <strong>Fecha:</strong> <span th:text="${mascota.fecha}"></span><br>
                        <strong>Ubicación:</strong> <span th:text="${mascota.ubicacion}"></span><br>
                    </p>
                    <p class="card-text" th:text="${mascota.descripcion}"></p>
                    <p class="card-text"><strong>Publicado por:</strong> <span th:text="${mascota.nombreDuenio}"></span></p>
                    <a th:href="@{/iniciar-chat/{id}(id=${mascota.id})}"
                       class="btn btn-primary"
                       th:if="${session.usuario?.id != mascota.idDuenio}">
                        Contactar al dueño
                    </a>
                </div>
            </div>
        </div>
    </div>

    <div class="mt-5">
        <h3>Comentarios públicos</h3>

        <form id="form-comentario" onsubmit="return false;">
            <input type="hidden" id="idReporte" th:value="${mascota.id}">
            <div class="mb-3">
                <textarea class="form-control" id="textoComentario" rows="3" placeholder="Escribe un comentario..."></textarea>
            </div>
            <button type="button" id="btn-publicar" class="btn btn-primary">Publicar comentario</button>
        </form>

        <div id="comentarios-container" class="mt-4"></div>
    </div>

    <a th:href="@{/home}" class="btn btn-secondary mt-3">Volver al listado</a>
</main>

<script th:inline="javascript">
    window.remitente = /*[[${session.usuario?.nombre}]]*/ 'Visitante';
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>

<script th:src="@{/js/comentarios-publicos.js}"></script>

</body>
</html>
