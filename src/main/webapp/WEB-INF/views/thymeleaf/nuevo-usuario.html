<!DOCTYPE HTML>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

  <title>Taller Web I</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65" crossorigin="anonymous">

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
  <link rel="stylesheet" th:href="@{/css/main.css(v=2.1)}" />

</head>

<body>

<nav class="navbar navbar-expand-md navbar-dark bg-dark fixed-top">
  <div class="container">
    <a class="navbar-brand fw-bold text-primary-gradient" href="#"><i class="bi bi-radar me-1"></i>Rastropet</a>
  </div>
</nav>

<main role="main" class="container mt-5 pt-5">

  <div class="container">
    <div id="loginbox" style="margin-top:50px;" class="mainbox col-md-6 col-md-offset-3 col-sm-8 col-sm-offset-2">
      <form action="#" th:action="@{/registrarme}" method="POST" th:object="${usuario}">
        <h3 class="form-signin-heading">Nuevo Usuario</h3>
        <hr class="colorgraph"><br>

        <input th:field="*{nombre}" type="text" id="nombre" class="form-control mb-2" placeholder="Nombre" required />

        <input th:field="*{apellido}" type="text" id="apellido" class="form-control mb-2" placeholder="Apellido" required />

        <input th:field="*{telefono}" type="text" id="telefono" class="form-control mb-2" placeholder="Teléfono" required />

        <input th:field="*{mail}" type="email" id="email" class="form-control mb-2" placeholder="Correo Electrónico" required />

        <input th:field="*{password}" type="password" id="password" class="form-control mb-2" placeholder="Contraseña" required />

        <input th:field="*{confirmarPassword}" type="password" id="confirmarPassword" class="form-control mb-4" placeholder="Confirmar Contraseña" required />

        <button id="btn-registrarme" class="btn btn-lg btn-primary btn-block" type="submit">Registrarme</button>

        <p th:if="${mensaje != null}" class="alert alert-danger mt-3" th:text="'Error: ' + ${mensaje}">
        </p>
      </form>

    </div>
  </div>

</main>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-kenU1KFdBIe4zVF0s0G1M5b4hcpxyD9F7jL+jjXkk+Q2h455rYXK/7HAuoJl+0I4"
        crossorigin="anonymous"></script>

</body>

</html>
